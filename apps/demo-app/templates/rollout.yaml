{{- if .Values.rollout.enabled }}
# Argo Rollouts Rollout resource — replaces the standard Deployment.
# Implements blue-green deployment strategy:
#   - Active service (blue): receives 100% of live traffic
#   - Preview service (green): new version deployed here for testing
#   - Promotion: manually triggered via `kubectl argo rollouts promote demo-app`
#   - Rollback: instant via `kubectl argo rollouts abort demo-app`
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "demo-app.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{- include "demo-app.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "demo-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/version: {{ .Values.appVersion | quote }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      serviceAccountName: {{ include "demo-app.serviceAccountName" . }}

      terminationGracePeriodSeconds: 60

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: APP_VERSION
              value: {{ .Values.appVersion | quote }}
            - name: APP_COLOR
              value: {{ .Values.appColor | quote }}
            - name: PORT
              value: "8080"

          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

  strategy:
    blueGreen:
      activeService: {{ .Values.rollout.strategy.blueGreen.activeService }}
      previewService: {{ .Values.rollout.strategy.blueGreen.previewService }}
      autoPromotionEnabled: {{ .Values.rollout.strategy.blueGreen.autoPromotionEnabled }}
      scaleDownDelaySeconds: {{ .Values.rollout.strategy.blueGreen.scaleDownDelaySeconds }}
      # Run analysis before promotion (optional — add AnalysisTemplate for automated checks)
      # prePromotionAnalysis:
      #   templates:
      #     - templateName: success-rate
      #   args:
      #     - name: service-name
      #       value: {{ .Values.rollout.strategy.blueGreen.previewService }}
{{- end }}
