# HPA for Sock Shop front-end — scales on CPU utilization
# In production, also add custom metrics (req/sec from Prometheus Adapter)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: front-end
  namespace: sock-shop
  labels:
    app: front-end
    env: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: front-end
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orders
  namespace: sock-shop
  labels:
    app: orders
    env: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orders
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: front-end
  namespace: sock-shop
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: front-end

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: catalogue
  namespace: sock-shop
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: catalogue

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payment
  namespace: sock-shop
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: payment
