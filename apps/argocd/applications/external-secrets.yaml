apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # Before apps that consume secrets
spec:
  project: default

  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "0.9.13"
    helm:
      releaseName: external-secrets
      values: |
        installCRDs: true

        serviceAccount:
          annotations:
            # IRSA — role ARN output from Terraform
            eks.amazonaws.com/role-arn: "arn:aws:iam::471112543812:role/eks-gitops-external-secrets"

        resources:
          requests:
            cpu: 10m
            memory: 96Mi
          limits:
            cpu: 100m
            memory: 256Mi

        tolerations:
          - key: CriticalAddonsOnly
            operator: Exists
            effect: NoSchedule

        # Webhook for validating ExternalSecret resources
        webhook:
          certManager:
            enabled: false
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

        certController:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-stores
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default

  source:
    repoURL: https://github.com/immanuwell/aws-eks-gitops-terraform-argocd
    targetRevision: main
    path: apps/security/external-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
