apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-kyverno
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"  # Install before apps that need policies
spec:
  project: default

  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: "3.1.4"
    helm:
      releaseName: kyverno
      values: |
        admissionController:
          replicas: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi

        backgroundController:
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

        # Tolerations for system nodes
        admissionController:
          tolerations:
            - key: CriticalAddonsOnly
              operator: Exists
              effect: NoSchedule

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-kyverno-policies
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"  # After kyverno controller is ready
spec:
  project: default

  source:
    repoURL: https://github.com/immanuwell/aws-eks-gitops-terraform-argocd
    targetRevision: main
    path: apps/security/kyverno/policies

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policies
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default

  source:
    repoURL: https://github.com/immanuwell/aws-eks-gitops-terraform-argocd
    targetRevision: main
    path: apps/security/network-policies

  destination:
    server: https://kubernetes.default.svc
    namespace: ""  # Applied to multiple namespaces via manifest metadata

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
