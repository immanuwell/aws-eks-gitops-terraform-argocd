# ConfigMap that loads the Sock Shop SLO dashboard into Grafana via sidecar.
# The grafana.sidecar.dashboards.enabled=true config watches for ConfigMaps
# with label grafana_dashboard=1 across all namespaces.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sock-shop-slo-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/component: monitoring
data:
  sock-shop-slo.json: |
    {
      "title": "Sock Shop — SLO Dashboard",
      "uid": "sock-shop-slo",
      "tags": ["sock-shop", "slo", "kubernetes"],
      "refresh": "30s",
      "time": { "from": "now-3h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Success Rate (SLO: 99.5%)",
          "type": "gauge",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "1 - (sum(rate(http_requests_total{namespace=\"sock-shop\", status=~\"5..\"}[5m])) / sum(rate(http_requests_total{namespace=\"sock-shop\"}[5m])))",
              "legendFormat": "Success Rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.995 },
                  { "color": "green", "value": 0.999 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "Request Rate by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"sock-shop\"}[5m])) by (service)",
              "legendFormat": "{{ service }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 3,
          "title": "Error Rate by Service (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"sock-shop\", status=~\"5..\"}[5m])) by (service) / sum(rate(http_requests_total{namespace=\"sock-shop\"}[5m])) by (service)",
              "legendFormat": "{{ service }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percentunit" } }
        },
        {
          "id": 4,
          "title": "Latency p50 / p99",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"sock-shop\"}[5m])) by (le, service))",
              "legendFormat": "{{ service }} p50"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace=\"sock-shop\"}[5m])) by (le, service))",
              "legendFormat": "{{ service }} p99"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        }
      ]
    }
