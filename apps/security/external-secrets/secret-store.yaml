# ClusterSecretStore — a cluster-wide store backed by AWS Secrets Manager.
# External Secrets Operator uses the IRSA role to authenticate to AWS.
# No AWS credentials are stored in Kubernetes — the pod gets a temporary
# token via IRSA which ESO uses to call Secrets Manager.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  namespace: external-secrets
  labels:
    app.kubernetes.io/component: secret-management
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # Auth via IRSA — no static credentials
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets

---
# ClusterSecretStore backed by SSM Parameter Store (for non-sensitive config)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-ssm-parameter-store
  namespace: external-secrets
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
