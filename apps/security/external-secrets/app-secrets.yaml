# ExternalSecret — declares what to fetch from Secrets Manager.
# The actual secret value lives ONLY in AWS — this file is safe to commit to Git.
#
# AWS Secrets Manager structure for this cluster:
#   eks-gitops/catalogue-db   → {"username": "root", "password": "..."}
#   eks-gitops/grafana        → {"admin-password": "..."}
#   eks-gitops/argocd         → {"admin.password": "..."}

---
# Catalogue DB credentials for Sock Shop
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: catalogue-db-credentials
  namespace: sock-shop
  labels:
    app: catalogue-db
    env: production
spec:
  refreshInterval: 1h  # How often ESO checks for secret rotation in AWS

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: catalogue-db-credentials  # Name of the Kubernetes Secret to create
    creationPolicy: Owner
    deletionPolicy: Retain           # Keep the secret if this ExternalSecret is deleted
    template:
      engineVersion: v2
      metadata:
        labels:
          app: catalogue-db

  data:
    - secretKey: password            # Key in the Kubernetes Secret
      remoteRef:
        key: eks-gitops/catalogue-db  # Path in Secrets Manager
        property: password            # JSON field within the secret

    - secretKey: username
      remoteRef:
        key: eks-gitops/catalogue-db
        property: username

---
# Grafana admin password — created in monitoring namespace
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: 24h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: grafana-admin-credentials
    creationPolicy: Owner

  data:
    - secretKey: admin-password
      remoteRef:
        key: eks-gitops/grafana
        property: admin-password

---
# Demo app secret — example of application consuming secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-app-config
  namespace: demo-app
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore

  target:
    name: demo-app-config
    creationPolicy: Owner
    template:
      type: Opaque

  # Fetch entire secret as individual keys
  dataFrom:
    - extract:
        key: eks-gitops/demo-app

---
# SSM Parameter example — non-sensitive configuration values
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-app-config-ssm
  namespace: demo-app
spec:
  refreshInterval: 30m

  secretStoreRef:
    name: aws-ssm-parameter-store
    kind: ClusterSecretStore

  target:
    name: demo-app-config-ssm
    creationPolicy: Owner

  dataFrom:
    - find:
        path: /eks-gitops/demo-app
        name:
          regexp: ".*"  # All parameters under this path
