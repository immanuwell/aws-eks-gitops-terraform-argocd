# Policy: Disallow privileged containers and dangerous host access
# Privileged containers can escape the container sandbox and access the host.
# Host namespaces bypass container isolation entirely.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers
    policies.kyverno.io/category: Pod Security Standards (Baseline)
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Privileged mode disables most container isolation. This policy enforces
      the Pod Security Standards Baseline profile by blocking privileged
      containers and host namespace access.
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    - name: disallow-privileged
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system]
              selector:
                matchLabels:
                  "app.kubernetes.io/managed-by": Helm
      validate:
        message: "Privileged containers are not allowed."
        pattern:
          spec:
            =(initContainers):
              - =(securityContext):
                  =(privileged): "false"
            containers:
              - =(securityContext):
                  =(privileged): "false"

    - name: disallow-host-namespaces
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system]
      validate:
        message: "Use of host namespaces (hostPID, hostIPC, hostNetwork) is not allowed."
        pattern:
          spec:
            =(hostPID): "false"
            =(hostIPC): "false"
            =(hostNetwork): "false"

    - name: disallow-host-path
      match:
        any:
          - resources:
              kinds: [Pod]
      exclude:
        any:
          - resources:
              namespaces: [kube-system]
      validate:
        message: "HostPath volumes are not allowed."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.volumes[].hostPath | length(@) }}"
                operator: GreaterThan
                value: 0

    - name: require-drop-all-capabilities
      match:
        any:
          - resources:
              kinds: [Pod]
              namespaces:
                - sock-shop
                - demo-app
      validate:
        message: "Containers must drop ALL Linux capabilities."
        foreach:
          - list: "request.object.spec.containers"
            pattern:
              securityContext:
                capabilities:
                  drop:
                    - ALL
