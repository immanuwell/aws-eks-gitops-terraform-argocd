name: CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'apps/demo-app/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/demo-app/**'

# Cancel in-progress runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write      # Required for OIDC → AWS STS
  contents: write      # Required to push image tag updates
  security-events: write  # Required to upload Trivy SARIF to GitHub Security
  pull-requests: write    # Required to post PR comments

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: demo-app
  APP_PATH: apps/demo-app

jobs:
  # ─── Build, Scan, Push ──────────────────────────────────────────────────────
  build-and-push:
    name: Build → Scan → Push
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build-push.outputs.digest }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no static secrets)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.title=demo-app
            org.opencontainers.image.description=EKS GitOps Demo Application
            org.opencontainers.image.vendor=platform-team

      # Build image locally first (without push) for scanning
      - name: Build Docker image (local, for scanning)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.APP_PATH }}
          push: false
          load: true
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:scan-target
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      # Run Trivy — fails the build on CRITICAL or HIGH CVEs
      - name: Run Trivy vulnerability scanner
        id: trivy-scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:scan-target
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
        continue-on-error: true  # Upload results even on failure

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Fail if Trivy found vulnerabilities
        if: steps.trivy-scan.outcome == 'failure'
        run: |
          echo "::error::Trivy scan found CRITICAL or HIGH vulnerabilities. Review the Security tab."
          exit 1

      # Only push on successful scan and main branch
      - name: Build and push to ECR
        id: build-push
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.APP_PATH }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
          provenance: true
          sbom: true  # Generate Software Bill of Materials

      - name: Summary
        if: github.ref == 'refs/heads/main'
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | \`${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | \`${{ steps.build-push.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | linux/amd64, linux/arm64 |" >> $GITHUB_STEP_SUMMARY

  # ─── Update GitOps Repository ────────────────────────────────────────────────
  update-gitops:
    name: Update GitOps Image Tag
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch full history so we can push
          fetch-depth: 0

      - name: Update image tag in Helm values
        env:
          NEW_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr-registry }}
        run: |
          # Use yq to safely update the YAML (no sed regex hacks)
          curl -sL https://github.com/mikefarah/yq/releases/download/v4.40.5/yq_linux_amd64 -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

          yq -i ".image.repository = \"${ECR_REGISTRY}/${ECR_REPOSITORY}\"" apps/demo-app/values.yaml
          yq -i ".image.tag = \"${NEW_TAG}\"" apps/demo-app/values.yaml

          echo "Updated image tag to: ${NEW_TAG}"
          cat apps/demo-app/values.yaml

      - name: Commit and push GitOps update
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add apps/demo-app/values.yaml

          # Skip commit if no changes (idempotent)
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "ci: promote demo-app to ${{ needs.build-and-push.outputs.image-tag }}

          Image: ${{ needs.build-and-push.outputs.ecr-registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image-tag }}
          Digest: ${{ needs.build-and-push.outputs.image-digest }}
          Triggered by: ${{ github.actor }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          git push

  # ─── Security: IaC Scanning ──────────────────────────────────────────────────
  scan-iac:
    name: Scan IaC (Trivy misconfig)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy for IaC misconfigurations
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infrastructure/
          format: sarif
          output: trivy-iac-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'  # Don't fail — inform only

      - name: Upload IaC scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-iac-results.sarif
          category: iac-scan
